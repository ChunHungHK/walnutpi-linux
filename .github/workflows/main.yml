name: Integrate DVB Drivers and Build Kernel

on:
  workflow_dispatch:
  push:
    branches: [master, walnutpi-5.15.174, integrate-dvb-drivers]
  pull_request:
    branches: [master, walnutpi-5.15.174]

jobs:
  integrate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Install git
        run: sudo apt update && sudo apt install -y git

      - name: Clone walnutpi/linux
        run: |
          git clone --depth=1 --branch walnutpi-5.15.174 https://github.com/walnutpi/linux walnutpi-linux
          cd walnutpi-linux
          git submodule update --init --recursive  # Handle submodules if any
        env:
          Pi_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # For private repo or rate limits

      - name: Install dependencies
        run: |
          sudo apt install -y build-essential flex bison libssl-dev bc libncurses5-dev libncursesw5-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu jq

      - name: Clone driver repositories
        run: |
          git clone --depth=1 https://github.com/nxdong520/avl6381
          git clone --depth=1 https://github.com/hanwckf/hd2312

      - name: Copy files and update Kconfig/Makefile
        working-directory: walnutpi-linux
        run: |
          # Step 1: Copy driver source files (adjust paths as needed)
          cp ../avl6381/avl6381.* drivers/media/dvb-frontends/
          cp ../avl6381/mxl603.* drivers/media/dvb-frontends/
          cp ../avl6381/it930x.* drivers/media/usb/dvb-usb-v2/
          cp ../hd2312/hd2312.* drivers/media/dvb-frontends/
          cp ../hd2312/cy68013.* drivers/media/usb/dvb-usb-v2/  # Adjust filename if needed

          # Step 2-3: Append Kconfig and Makefile entries using sed
          sed -i '/endmenu/i \
          config DVB_AVL6381\n\
          \ttristate "Availink AVL6381 DVB-C/DTMB/DVB-T2 demodulator"\n\
          \tdepends on DVB_CORE && I2C\n\
          \thelp\n\
          \t  Support for Availink AVL6381 USB devices (DVBC/DTMB/DVBT2).\n\
          config DVB_MXL603\n\
          \ttristate "MaxLinear MXL603 tuner"\n\
          \tdepends on DVB_CORE && I2C\n\
          \thelp\n\
          \t  Support for MaxLinear MXL603 tuner in AVL6381 devices.\n\
          config DVB_HD2312\n\
          \ttristate "HDIC HD2312 DTMB/DMB-TH demodulator"\n\
          \tdepends on DVB_CORE && I2C\n\
          \thelp\n\
          \t  Support for HDIC HD2312 USB adapters (DTMB/DMB-TH).\n\
          ' drivers/media/dvb-frontends/Kconfig

          sed -i '/endmenu/i \
          config DVB_USB_IT930X\n\
          \ttristate "ITE IT930x USB DVB device (for AVL6381)"\n\
          \tdepends on DVB_USB_V2\n\
          \thelp\n\
          \t  Support for ITE IT930x USB bridge in AVL6381 devices.\n\
          config DVB_USB_CY68013\n\
          \ttristate "Cypress CY68013A USB DVB device (for HD2312)"\n\
          \tdepends on DVB_USB_V2\n\
          \thelp\n\
          \t  Support for Cypress CY68013A USB bridge in HD2312 devices.\n\
          ' drivers/media/usb/dvb-usb-v2/Kconfig

          sed -i '/obj-$(CONFIG_DVB_CORE)/a \
          obj-$(CONFIG_DVB_AVL6381) += avl6381.o\n\
          obj-$(CONFIG_DVB_MXL603) += mxl603.o\n\
          obj-$(CONFIG_DVB_HD2312) += hd2312.o\
          ' drivers/media/dvb-frontends/Makefile

          sed -i '/obj-$(CONFIG_DVB_USB_V2)/a \
          obj-$(CONFIG_DVB_USB_IT930X) += it930x.o\n\
          obj-$(CONFIG_DVB_USB_CY68013) += cy68013.o\
          ' drivers/media/usb/dvb-usb-v2/Makefile

      - name: Cache kernel build
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-kernel-build-${{ hashFiles('walnutpi-linux/.config') }}
          path: walnutpi-linux

      - name: Configure kernel (non-interactive)
        working-directory: walnutpi-linux
        run: |
          # Use olddefconfig for non-interactive config update
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          # Enable new config options as modules
          scripts/config --module CONFIG_DVB_AVL6381
          scripts/config --module CONFIG_DVB_MXL603
          scripts/config --module CONFIG_DVB_HD2312
          scripts/config --module CONFIG_DVB_USB_IT930X
          scripts/config --module CONFIG_DVB_USB_CY68013
          # Ensure dependencies
          scripts/config --enable CONFIG_DVB_CORE
          scripts/config --enable CONFIG_DVB_USB_V2
          scripts/config --enable CONFIG_I2C
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- oldconfig

      - name: Build kernel
        working-directory: walnutpi-linux
        run: make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)

      - name: Build and install modules
        working-directory: walnutpi-linux
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_install INSTALL_MOD_PATH=../rootfs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: |
            walnutpi-linux/arch/arm64/boot/Image
            walnutpi-linux/arch/arm64/boot/dts/*.dtb
            rootfs/lib/modules/

      - name: Commit changes (only on push to integrate branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/integrate-dvb-drivers'
        run: |
          cd walnutpi-linux
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-integrate AVL6381 and HD2312 DVB drivers"
          git push origin integrate-dvb-drivers
        env:
          Pi_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test (lint and basic check)
        working-directory: walnutpi-linux
        run: |
          scripts/checkpatch.pl -f drivers/media/dvb-frontends/avl6381.c
          scripts/checkpatch.pl -f drivers/media/dvb-frontends/mxl603.c
          scripts/checkpatch.pl -f drivers/media/dvb-frontends/hd2312.c
          scripts/checkpatch.pl -f drivers/media/usb/dvb-usb-v2/it930x.c
          scripts/checkpatch.pl -f drivers/media/usb/dvb-usb-v2/cy68013.c
